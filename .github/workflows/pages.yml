name: Daily update and deploy dashboard

on:
  schedule:
    - cron: "0 4 * * *"   # Every day at 08:00 Azerbaijan time
  workflow_dispatch:
  push:
    branches:
      - main
      - master

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: daily-dashboard-update
  cancel-in-progress: false

jobs:
  update-and-deploy:
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Pull Git LFS files
        run: |
          git lfs pull
          grep -R "version https://git-lfs.github.com/spec/v1" -n docs || true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip

          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          else
            echo "requirements.txt not found, skipping dependency install"
          fi

      - name: Register Jupyter kernel
        run: |
          python -m pip install ipykernel nbconvert jupyter
          python -m ipykernel install --user --name python3 --display-name "Python 3"
          jupyter kernelspec list

      - name: Run wildfire pipeline
        env:
          CI: true
          GITHUB_ACTIONS: true
          SKIP_GEE_AUTH: true
        run: |
          python run_pipeline.py

      - name: Commit updated files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add docs dashboard/data data/processed outputs models . || true

          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Daily dashboard update"
            git push origin HEAD:${{ github.ref_name }}
          fi

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload dashboard artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
