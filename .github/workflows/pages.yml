name: Deploy dashboard to GitHub Pages

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repository without LFS
        uses: actions/checkout@v4
        with:
          lfs: false
          fetch-depth: 1

      - name: Check dashboard files
        run: |
          echo "Checking docs folder..."

          if [ ! -d docs ]; then
            echo "ERROR: docs folder does not exist"
            exit 1
          fi

          if [ ! -f docs/index.html ]; then
            echo "ERROR: docs/index.html does not exist"
            exit 1
          fi

          if grep -R "version https://git-lfs.github.com/spec/v1" docs; then
            echo "ERROR: Git LFS pointer found inside docs/"
            echo "Your docs folder contains files stored in LFS."
            echo "Because your LFS budget is exceeded, GitHub Actions cannot download them."
            exit 1
          fi

          echo "Dashboard files look OK."

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload dashboard artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
