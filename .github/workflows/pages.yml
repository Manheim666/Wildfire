name: Daily update and deploy dashboard

on:
  schedule:
    - cron: "0 4 * * *"
  workflow_dispatch:
  push:
    branches:
      - main
      - master

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: daily-dashboard-update
  cancel-in-progress: false

jobs:
  update-and-deploy:
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repository without downloading all LFS files
        uses: actions/checkout@v4
        with:
          lfs: false
          fetch-depth: 1

      - name: Install Git LFS and pull only required files
        run: |
          git lfs install

          git lfs pull \
            --include="dashboard/data/**,docs/**,data/processed/**,notebooks/**" \
            --exclude="data/raw/**,models/**,*.zip,*.tif,*.h5,*.keras,*.pt,*.pth"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip

          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi

          python -m pip install jupyter nbconvert ipykernel

      - name: Register Python Jupyter kernel
        run: |
          python -m ipykernel install --user --name python3 --display-name "Python 3"
          jupyter kernelspec list

      - name: Run wildfire pipeline
        env:
          CI: true
          GITHUB_ACTIONS: true
          SKIP_GEE_AUTH: true
        run: |
          python run_pipeline.py

      - name: Check dashboard files
        run: |
          echo "Checking docs folder..."

          if [ ! -d docs ]; then
            echo "ERROR: docs folder does not exist"
            exit 1
          fi

          if [ ! -f docs/index.html ]; then
            echo "ERROR: docs/index.html does not exist"
            exit 1
          fi

          if grep -R "version https://git-lfs.github.com/spec/v1" docs; then
            echo "ERROR: Git LFS pointer found inside docs/"
            echo "Some files in docs/ are not real files, only LFS pointers."
            exit 1
          fi

          echo "Dashboard files look OK."

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload dashboard artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
